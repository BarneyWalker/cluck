            font-size: 0.8rem;
            color: #e94560;
            display: none;
        }

        .live-banner.visible { display: block; }

            color: #fff;
        }

        .tab-content { display: none; max-width: 1200px; margin: 0 auto; }

        const knockoutFixtures = [
            { desc: "2nd Group A vs 2nd Group B", round: "Round of 32" },
            { desc: "1st Group E vs 3rd A/B/C/D/F", round: "Round of 32" },

            { desc: "1st Group L vs 3rd E/H/I/J/K", round: "Round of 32" },
            { desc: "1st Group D vs 3rd B/E/F/I/J", round: "Round of 32" },
            { desc: "1st Group G vs 3rd A/E/H/I/J", round: "Round of 32" },
            { desc: "2nd Group K vs 2nd Group L", round: "Round of 32" },
            { desc: "1st Group H vs 2nd Group J", round: "Round of 32" },
            { desc: "1st Group B vs 3rd E/F/G/I/J", round: "Round of 32" },

            { desc: "1st Group K vs 3rd D/E/I/J/L", round: "Round of 32" },

            { desc: "W74 vs W77", round: "Round of 16" },

            { desc: "W79 vs W80", round: "Round of 16" },
            { desc: "W83 vs W84", round: "Round of 16" },
            { desc: "W81 vs W82", round: "Round of 16" },
            { desc: "W86 vs W88", round: "Round of 16" },
            { desc: "W85 vs W87", round: "Round of 16" },
            { desc: "W89 vs W90", round: "Quarter-Final" },
            { desc: "W93 vs W94", round: "Quarter-Final" },
            { desc: "W91 vs W92", round: "Quarter-Final" },
            { desc: "W95 vs W96", round: "Quarter-Final" },
            { desc: "W97 vs W98", round: "Semi-Final" },
            { desc: "W99 vs W100", round: "Semi-Final" },
            { desc: "L101 vs L102", round: "Third Place" },
            { desc: "W101 vs W102", round: "Final" }
        ];

        // ─── ESPN API INTEGRATION ────────────────────────────────────────────

        const ESPN_SCOREBOARD = "https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard";
        const ESPN_STANDINGS = "https://site.api.espn.com/apis/v2/sports/soccer/fifa.world/standings";

        const espnNameMap = {
            "Korea Republic": "South Korea",
            "IR Iran": "Iran",
            "Türkiye": "Turkey",
            "Ivory Coast": "Côte d'Ivoire",
            "Cote d'Ivoire": "Côte d'Ivoire",
            "Cape Verde": "Cabo Verde",
            "DR Congo": "Congo DR",
            "Dem. Rep. Congo": "Congo DR",
            "Bosnia-Herzegovina": "Bosnia and Herzegovina",
            "Czech Republic": "Czechia",
            "Curacao": "Curaçao",
            "United States": "USA"
        };

        function normaliseTeamName(espnName) {
            return espnNameMap[espnName] || espnName;
        }

        let liveMatchData = {};
        let hasLiveMatches = false;
        let apiAvailable = true;

        async function fetchScores() {
            try {
                const resp = await fetch(ESPN_SCOREBOARD);
                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                const data = await resp.json();

                liveMatchData = {};
                hasLiveMatches = false;

                (data.events || []).forEach(event => {
                    const competitors = event.competitions?.[0]?.competitors || event.competitors || [];
                    if (competitors.length < 2) return;

                    const homeComp = competitors.find(c => c.homeAway === "home") || competitors[0];
                    const awayComp = competitors.find(c => c.homeAway === "away") || competitors[1];

                    const homeName = normaliseTeamName(homeComp.team?.displayName || homeComp.team?.location || "");
                    const awayName = normaliseTeamName(awayComp.team?.displayName || awayComp.team?.location || "");

                    const status = event.status || event.competitions?.[0]?.status || {};
                    const state = status.type?.state || "pre";
                    if (state === "in") hasLiveMatches = true;

                    const key = `${homeName} vs ${awayName}`;
                    liveMatchData[key] = {
                        homeScore: homeComp.score || "0",
                        awayScore: awayComp.score || "0",
                        state: state,
                        clock: status.displayClock || "",
                        detail: status.type?.detail || "",
                        kickoff: event.date || event.competitions?.[0]?.date || ""
                    };
                });

                apiAvailable = true;
                document.getElementById("errorBanner").classList.remove("visible");
                updateLastUpdated();
                renderMatches();
            } catch (e) {
                console.warn("ESPN scoreboard fetch failed:", e);
                apiAvailable = false;
                document.getElementById("errorBanner").classList.add("visible");
            }
        }

        let standingsData = {};

        async function fetchStandings() {
            try {
                const resp = await fetch(ESPN_STANDINGS);
                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                const data = await resp.json();

                standingsData = {};
                const children = data.children || [];

                children.forEach(group => {
                    const groupName = group.name || "";
                    const letter = groupName.replace("Group ", "");
                    if (!letter) return;

                    const entries = group.standings?.entries || [];
                    standingsData[letter] = entries.map((entry, idx) => {
                        const stats = {};
                        (entry.stats || []).forEach(s => { stats[s.name] = s.displayValue || s.value || "0"; });

                        return {
                            team: normaliseTeamName(entry.team?.location || entry.team?.displayName || ""),
                            p: parseInt(stats.gamesPlayed) || 0,
                            w: parseInt(stats.wins) || 0,
                            d: parseInt(stats.ties) || 0,
                            l: parseInt(stats.losses) || 0,
                            gf: parseInt(stats.pointsFor) || 0,
                            ga: parseInt(stats.pointsAgainst) || 0,
                            gd: parseInt(stats.pointDifferential) || 0,
                            pts: parseInt(stats.points) || 0,
                            rank: entry.note?.rank || (idx + 1)
                        };
                    });
                });

                renderGroups();
            } catch (e) {
                console.warn("ESPN standings fetch failed:", e);
                renderGroups();
            }
        }

        function updateLastUpdated() {
            const now = new Date();
            const time = now.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
            document.getElementById("lastUpdated").textContent = `Last updated: ${time}`;
        }

        // ─── FLAG LOADING (CDN with local fallback) ──────────────────────────

        let flagBase = "https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.0.0/flags/4x3/";
        let flagExt = ".svg";
        const flagTestImg = new Image();
        flagTestImg.onerror = function() {
            flagBase = "./WorldCupWebpage_files/";
            flagExt = ".png";
            renderAll();
        };
        flagTestImg.onload = function() { /* CDN works, keep defaults */ };
        flagTestImg.src = flagBase + "gb-eng" + flagExt;

        function flagImg(code, size = 24) {
            return `<img src="${flagBase}${code}${flagExt}" alt="" style="vertical-align:middle;margin-right:6px;border-radius:2px;" width="${size}" height="${Math.round(size * 0.75)}">`;
        }

        // ─── UTILITY FUNCTIONS ───────────────────────────────────────────────

        function getOwner(countryName) {
            const r = results.find(r => r.country === countryName);
            return r ? r.participant : null;
        }

        function ownerHtml(countryName) {
            const owner = getOwner(countryName);
            return owner ? `<span class="owner-name">${owner}</span>` : '';
        }

        function getCode(countryName) {
            const c = countries.find(c => c.name === countryName);
            return c ? c.code : '';
        }

        function formatKickoff(isoDate) {
            if (!isoDate) return "";
            const d = new Date(isoDate);
            if (isNaN(d.getTime())) return "";
            return d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
        }

        function isToday(dateStr) {
            const today = new Date();
            const d = new Date(dateStr + "T00:00:00");
            return d.toDateString() === today.toDateString();
        }

        function formatDateHeader(dateStr) {
            const d = new Date(dateStr + "T00:00:00");
            return d.toLocaleDateString([], { weekday: "short", day: "numeric", month: "short" });
        }

        // ─── RENDER FUNCTIONS ────────────────────────────────────────────────

        function renderParticipants() {
            document.getElementById('participantsGrid').innerHTML = results.map(r =>
                `<div class="participant-card">
                    <div class="participant-name">${r.participant}</div>
                    <div class="participant-team">${flagImg(r.code)}${r.country}</div>
                </div>`
            ).join('');
        }

        function renderCountries() {
            const sorted = [...countries].sort((a, b) => a.name.localeCompare(b.name));
            const cols = 4, rows = Math.ceil(sorted.length / cols);
            let html = '<table class="countries-table">';
            for (let r = 0; r < rows; r++) {
                html += '<tr>';
                for (let c = 0; c < cols; c++) {
                    const idx = r + c * rows;
                    if (idx < sorted.length) {
                        const t = sorted[idx];
                        html += `<td>${flagImg(t.code)} ${t.name}<br>${ownerHtml(t.name)}</td>`;
                    } else html += '<td></td>';
                }
                html += '</tr>';
            }
            html += '</table>';
            document.getElementById('countriesSection').innerHTML = html;
        }

        function renderGroups() {
            document.getElementById('groupsGrid').innerHTML = Object.entries(groups).map(([letter, teams]) => {
                const standing = standingsData[letter];
                const teamRows = standing
                    ? standing.map(t => ({ ...t, code: getCode(t.team) }))
                    : teams.map(t => ({ team: t, code: getCode(t), p: 0, w: 0, d: 0, l: 0, gf: 0, ga: 0, gd: 0, pts: 0, rank: 0 }));

                return `
                <div class="group-card">
                    <h3>Group ${letter}</h3>
                    <table class="group-table">
                        <tr>
                            <th style="text-align:left;">Team</th>
                            <th>P</th><th>W</th><th>D</th><th>L</th>
                            <th>GF</th><th>GA</th><th>GD</th><th>Pts</th>
                        </tr>
                        ${teamRows.map(t => {
                            let rowClass = "";
                            if (t.rank === 1 || t.rank === 2) rowClass = "qualified";
                            else if (t.rank === 3) rowClass = "potential";
                            else if (t.rank === 4 && t.p > 0) rowClass = "eliminated";
                            return `<tr class="${rowClass}">
                                <td>${flagImg(t.code, 18)} ${t.team} ${ownerHtml(t.team)}</td>
                                <td>${t.p}</td><td>${t.w}</td><td>${t.d}</td><td>${t.l}</td>
                                <td>${t.gf}</td><td>${t.ga}</td><td>${t.gd > 0 ? '+' + t.gd : t.gd}</td>
                                <td class="pts-cell">${t.pts}</td>
                            </tr>`;
                        }).join("")}
                    </table>
                </div>`;
            }).join("");
        }

        function renderMatches() {
            const byDate = {};
            fixtures.forEach(m => {
                if (!byDate[m.date]) byDate[m.date] = [];
                byDate[m.date].push(m);
            });

            const liveBanner = document.getElementById("liveBanner");
            liveBanner.classList.toggle("visible", hasLiveMatches);

            document.getElementById('matchesList').innerHTML = Object.entries(byDate).map(([date, matches]) => {
                const today = isToday(date);
                return `
                <div class="calendar-day">
                    <div class="calendar-day-header ${today ? 'today' : ''}">${formatDateHeader(date)}${today ? ' — TODAY' : ''}</div>
                    <div class="calendar-matches">
                        ${matches.map(m => {
                            const key = `${m.home} vs ${m.away}`;
                            const live = liveMatchData[key];

                            let cardClass = "match-card";
                            let scoreHtml = "";
                            let statusHtml = "";

                            if (live) {
                                if (live.state === "in") {
                                    cardClass += " live";
                                    scoreHtml = `<div class="match-score live-score">${live.homeScore} - ${live.awayScore}</div>`;
                                    statusHtml = `<span class="match-status live">${live.clock || 'LIVE'}</span>`;
                                } else if (live.state === "post") {
                                    cardClass += " finished";
                                    scoreHtml = `<div class="match-score">${live.homeScore} - ${live.awayScore}</div>`;
                                    statusHtml = `<span class="match-status ft">FT</span>`;
                                } else {
                                    scoreHtml = `<div class="match-score" style="font-size:0.8rem;color:#8892b0;">vs</div>`;
                                    const kickoff = formatKickoff(live.kickoff);
                                    statusHtml = kickoff ? `<span class="match-status scheduled">${kickoff}</span>` : '';
                                }
                            } else {
                                scoreHtml = `<div class="match-score" style="font-size:0.8rem;color:#8892b0;">vs</div>`;
                            }

                            const ho = getOwner(m.home) || '';
                            const ao = getOwner(m.away) || '';

                            return `<div class="${cardClass}">
                                <div class="match-row-teams">
                                    <div class="match-team">${flagImg(getCode(m.home), 20)}<span>${m.home}</span></div>
                                    ${scoreHtml}
                                    <div class="match-team away"><span>${m.away}</span>${flagImg(getCode(m.away), 20)}</div>
                                </div>
                                <div class="match-row-owners">
                                    <div class="match-owner">${ho}</div>
                                    <div class="match-owner-spacer"></div>
                                    <div class="match-owner away">${ao}</div>
                                </div>
                                <div class="match-meta">
                                    <span>Grp ${m.group}</span>
                                    ${statusHtml}
                                </div>
                            </div>`;
                        }).join("")}
                    </div>
                </div>`;
            }).join("");
        }

        function renderBracket() {
            const section = document.getElementById("bracketSection");
            const r32 = knockoutFixtures.filter(m => m.round === "Round of 32");
            const r16 = knockoutFixtures.filter(m => m.round === "Round of 16");
            const qf = knockoutFixtures.filter(m => m.round === "Quarter-Final");
            const sf = knockoutFixtures.filter(m => m.round === "Semi-Final");
            const final = knockoutFixtures.find(m => m.round === "Final");
            const third = knockoutFixtures.find(m => m.round === "Third Place");

            function slotHtml(m) {
                const p = m.desc.split(" vs ");
                return `<div class="bracket-slot"><div class="team-row"><span class="team-name">${p[0]}</span></div><div class="team-row"><span class="team-name">${p[1]}</span></div></div>`;
            }
            function colHtml(h, ms) {
                return `<div class="bracket-col"><div class="bracket-col-header">${h}</div>${ms.map(m => slotHtml(m)).join("")}</div>`;
            }

            section.innerHTML = `
                <div class="bracket-tree">
                    ${colHtml("Round of 32", r32.slice(0, 8))}
                    ${colHtml("Round of 16", r16.slice(0, 4))}
                    ${colHtml("Quarter-Finals", qf.slice(0, 2))}
                    ${colHtml("Semi-Final", [sf[0]])}
                    <div class="bracket-col"><div class="bracket-col-header">Final</div><div class="bracket-final"><div class="trophy">🏆</div><div class="champion-label">Champion</div>${slotHtml(final)}</div></div>
                    ${colHtml("Semi-Final", [sf[1]])}
                    ${colHtml("Quarter-Finals", qf.slice(2, 4))}
                    ${colHtml("Round of 16", r16.slice(4, 8))}
                    ${colHtml("Round of 32", r32.slice(8, 16))}
                </div>
                <div class="third-place"><h4>Third-Place Play-off</h4>${slotHtml(third)}</div>
            `;
        }

        
        function renderForfeits() {
            document.getElementById('forfeitsSection').innerHTML = `
                <div class="forfeits-card">
                    <h3 style="color:#f5a623;margin-bottom:1rem;">Forfeit Prizes</h3>
                    <table class="forfeits-table">
                        <tr><th>Prize</th><th>Rule</th></tr>
                        <tr><td>Prize 1</td><td>Worst Team (within our pots)</td></tr>
                        <tr><td>Prize 2</td><td>Team containing Golden Boot Winner (tie breakers sorted by total team goals)</td></tr>
                        <tr><td>Prize 3</td><td>Most bookings based on booking points (10 points for yellow, 25 points for red)</td></tr>
                        <tr><td>Prize 4</td><td>Least goals scored</td></tr>
                        <tr><td>Prize 5</td><td>Least goals conceded</td></tr>
                        <tr><td>Prize 6</td><td>Fastest goal</td></tr>
                        <tr><td>Prize 7</td><td>Quickest red card</td></tr>
                        <tr><td>Prize 8</td><td>Most penalties conceded</td></tr>
                    </table>
                </div>`;
        }


        // ─── POLLING & INIT ──────────────────────────────────────────────────

        let pollInterval = null;

        function startPolling() {
            const intervalMs = hasLiveMatches ? 60000 : 300000;

            if (pollInterval) clearInterval(pollInterval);
            pollInterval = setInterval(async () => {
                await fetchScores();
                await fetchStandings();
                const newInterval = hasLiveMatches ? 60000 : 300000;
                if (newInterval !== intervalMs) startPolling();
            }, intervalMs);
        }

        function renderAll() {
            renderParticipants();
            renderCountries();
            renderGroups();
            renderMatches();
            renderBracket();
            renderForfeits();
        }

        function initTabs() {
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                    btn.classList.add('active');
                    document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
                });
            });
        }

        async function init() {
            initTabs();
            renderAll();
            await Promise.all([fetchScores(), fetchStandings()]);
            startPolling();
        }

        init();
    </script>
